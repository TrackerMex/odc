services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: odc
      POSTGRES_PASSWORD: odc
      POSTGRES_DB: odc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      - db
    env_file: .env
    environment:
      DATABASE_URL: postgres://odc:odc@db:5432/odc
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    depends_on:
      - backend
    environment:
      # Backend is reachable as `backend` on the docker-compose network, not
      # `localhost` — only used server-side (SSR), see src/lib/api.ts.
      API_BASE_URL: http://backend:3001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
